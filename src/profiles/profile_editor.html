<div id="scaled-content">
<div class="bg-base-200 overflow-hidden flex-grow flex flex-col w-[1920px] h-[1200px]" role="main" aria-label="Profile Editor">

    <!-- Header -->
    <div class="flex justify-between items-center p-6 border-b border-base-300 bg-[var(--box-color)] h-[200px] px-[40px]">
        <div class="flex items-center gap-4 flex-1">
            <span id="editor-title-display" class="text-[36px] font-bold text-[var(--text-primary)] cursor-pointer select-none">Untitled Profile</span>
            <input id="editor-title-input" type="text" class="text-[36px] font-bold text-[var(--text-primary)] bg-transparent border-b-2 border-[var(--mimoja-blue)] outline-none hidden w-[500px]" />
            <svg id="editor-title-edit-icon" role="button" tabindex="0" aria-label="Edit Profile Title" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-[var(--text-primary)] cursor-pointer" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
        </div>
        <div class="flex items-center gap-[22px]">
<button id="editor-cancel-btn" class="settings-button flex justify-center items-center min-h-0 w-[240px] h-[82.5px] px-[67.5px] py-[26px] border border-solid border-[var(--mimoja-blue)] text-[var(--mimoja-blue)] rounded-[67.5px] font-bold text-[24px]">CANCEL</button>
            <button id="editor-save-btn" class="settings-button flex justify-center items-center bg-[var(--mimoja-blue)] text-white min-h-0 w-[300px] h-[82.5px] px-[67.5px] py-[26px] font-bold text-[24px] rounded-[67.5px]">SAVE</button>
        </div>
    </div>

    <!-- Tab bar -->
    <div class="flex items-center px-[40px] h-[140px] border-b border-base-300 bg-[var(--box-color)]">
        <div class="flex items-center gap-[20px] bg-white border-2 border-[#e8e8e8] rounded-[80px] px-[20px] h-[100px]">
            <button class="editor-tab-btn font-bold px-[40px] h-[80px] rounded-[60px] transition-colors text-[24px] tracking-wide" data-tab="0">STEPS</button>
            <button class="editor-tab-btn font-bold px-[40px] h-[80px] rounded-[60px] transition-colors text-[24px] tracking-wide" data-tab="1">SETTINGS</button>
            <button class="editor-tab-btn font-bold px-[40px] h-[80px] rounded-[60px] transition-colors text-[24px] tracking-wide" data-tab="2">REVIEW</button>
        </div>
    </div>

    <!-- Content area -->
    <div class="flex-1 overflow-hidden bg-[var(--profile-button-background-color)]">

        <!-- Tab 0: Steps -->
        <div id="editor-tab-panel-0" class="editor-tab-panel h-full">
            <div id="editor-steps-container" class="flex flex-row overflow-x-auto h-full">
                <!-- Step cards rendered by JS -->
            </div>
        </div>

        <!-- Tab 1: Settings -->
        <div id="editor-tab-panel-1" class="editor-tab-panel h-full hidden">
            <div id="editor-settings-container" class="p-[40px] grid grid-cols-2 gap-[40px]">
                <!-- Settings fields rendered by JS -->
            </div>
        </div>

        <!-- Tab 2: Review -->
        <div id="editor-tab-panel-2" class="editor-tab-panel h-full hidden overflow-hidden">
            <div class="flex h-full bg-white rounded-[20px] mx-[40px] my-[30px] border-2 border-[#e8e8e8] overflow-hidden">
                <!-- Left: Steps Review -->
                <div id="review-steps-col" class="flex-1 border-r-2 border-[#e8e8e8] overflow-y-auto p-[60px] flex flex-col gap-[40px]">
                    <p class="text-[40px] font-semibold text-[#121212]">Steps Review</p>
                    <div id="review-steps-list" class="flex flex-col gap-[40px]"></div>
                </div>
                <!-- Right: Settings + Graph -->
                <div id="review-right-col" class="flex-1 overflow-y-auto p-[60px] flex flex-col gap-[50px]">
                    <div class="flex flex-col gap-[40px]">
                        <p class="text-[40px] font-semibold text-[#121212]">Profile settings</p>
                        <ul id="review-settings-list" class="flex flex-col gap-[20px] list-disc list-inside text-[32px] text-[#121212]"></ul>
                    </div>
                    <div class="h-[2px] bg-[#e8e8e8]"></div>
                    <div class="flex flex-col gap-[30px]">
                        <p class="text-[40px] font-semibold text-[#121212]">Graph Preview</p>
                        <div id="review-graph" class="w-full h-[400px]"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="app-toast" class="toast toast-bottom toast-center" style="z-index: 10001; display: none;">
    <div class="alert alert-info text-sm">
        <span id="app-toast-message"></span>
    </div>
</div>

</div>
